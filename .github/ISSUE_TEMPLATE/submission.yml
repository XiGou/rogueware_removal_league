name: Submit league result
description: Submit a Rogueware Removal League result for an existing project
title: "Submission: "
labels: ["submission"]
body:
  - type: markdown
    attributes:
      value: |
        If you opened this form from a project page, the project fields should already be filled in.
        This issue will be used as the leaderboard proof link.
        After creating the issue, add detailed evidence in issue comments: screenshots, recordings, environment notes, timing method, and cleanup verification.
        Please do not include private paths, usernames, emails, device IDs, or license keys in evidence.

  - type: input
    id: project_slug
    attributes:
      label: Project slug
      description: The leaderboard project this result belongs to.
      placeholder: wintoolbox
    validations:
      required: true

  - type: input
    id: project_title
    attributes:
      label: Project title
      description: Usually prefilled from the project page.
      placeholder: wintoolbox Removal Challenge
    validations:
      required: false

  - type: input
    id: name
    attributes:
      label: Name or handle
      placeholder: YourName
    validations:
      required: true

  - type: input
    id: time_seconds
    attributes:
      label: Total time in seconds
      description: Positive integer seconds only. The project page converts duration formats before opening this issue.
      placeholder: "1234"
    validations:
      required: true

  - type: input
    id: date
    attributes:
      label: Completion date
      description: YYYY-MM-DD.
      placeholder: "2026-06-12"
    validations:
      required: true

  - type: textarea
    id: key_steps
    attributes:
      label: Key steps
      description: List the important uninstall and cleanup actions.
      placeholder: |
        1. Started timer after install completed.
        2. Removed the main app.
        3. Cleaned services, startup items, scheduled tasks, and folders.
        4. Rebooted and confirmed no obvious leftovers.
    validations:
      required: true

  - type: input
    id: completion_quote
    attributes:
      label: Completion quote
      description: One short sentence for the leaderboard.
      placeholder: It is finally gone.
    validations:
      required: true

  - type: checkboxes
    id: evidence_followup
    attributes:
      label: Evidence follow-up
      options:
        - label: I will add detailed evidence in issue comments and remove or blur private information.
          required: true
